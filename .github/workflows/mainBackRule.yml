name: Deploy to Preproduction Backend

on: 
  pull_request: 
    branches:
      - main-Back
    
jobs:
  deploy:
    
    runs-on: ubuntu-latest
        
    steps:
      - name: Checkout Codigo
        uses: actions/checkout@v4
    
      - name: Validar Branchs
        run: |
          if [ ${{ github.event.pull_request.head.ref }}.startsWith('main') != true ]; then
            echo "❌ ERRO: A branch de origem não é 'main'. Merge bloqueado!"
            exit 1
          fi
          echo "Branch de origem é dev-Back"

      - name: Executar Deploy
        run: |
          echo "Fazendo deploy..."
