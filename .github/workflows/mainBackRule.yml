name: Deploy to Preproduction Backend

on: 
  pull_request: 
    branches:
      - main-Back
    
jobs:
  deploy:
    
    runs-on: ubuntu-latest
        
    steps:
      - name: Checkout Codigo
        uses: actions/checkout@v4
    
      - name: Validar Branchs
        run: |
          if [ "${{ github.event.pull_request.head.ref }}" != "dev-Back" ]; then
            echo "Branch de origem: ${{ github.event.pull_request.head.ref }}"
            echo "Branch de destino: ${{ github.event.pull_request.base.ref }}"
            echo "Branch de origem não é dev-Back"
            exit 1
          fi
          echo "Branch de origem é dev-Back"

      - name: Executar Deploy
        run: |
          echo "Fazendo deploy..."
