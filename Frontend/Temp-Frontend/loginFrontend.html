        <div class="bee-area">

            Q135 0 160 0

            Q265 0 280 20

            L360 120

            Q380 140 380 160

            L280 300

            Q265 320 240 320

            L40 200

    <div class="login-box">
        <input type="text" placeholder="Usuário">
        <input type="password" placeholder="Senha">

        <button>Confirmar</button>
    </div>

</div>
